name: Update gallery

on:
  push:
    paths:
      - "photos/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  gallery:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build gallery.json
        run: |
          python3 << 'PY'
          import json
          from pathlib import Path
          photos = Path("photos")
          ext = {".jpg", ".jpeg", ".png", ".webp", ".gif"}
          files = sorted(
              f"photos/{p.name}"
              for p in photos.iterdir()
              if p.is_file() and p.suffix.lower() in ext
          )
          Path("gallery.json").write_text(json.dumps(files, indent=2) + "\n")
          print(f"{len(files)} photos")
          PY

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gallery.json
          git diff --staged --quiet || git commit -m "chore: update gallery.json"
          git push
